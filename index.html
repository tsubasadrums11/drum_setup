<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:sans-serif;
background:#eee;
overflow:hidden;
}

#panel{
position:absolute;
left:0;
top:0;
width:220px;
height:100%;
background:#f5f5f5;
padding:15px;
box-sizing:border-box;
overflow:auto;
}

#panel h2{
margin:0 0 10px 0;
}

#canvas{
position:absolute;
left:220px;
top:0;
}

#addBtn{
position:absolute;
right:20px;
bottom:20px;
width:60px;
height:60px;
border-radius:50%;
background:#ffd400;
border:none;
font-size:32px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

#menuBtn{
position:absolute;
right:20px;
top:20px;
width:50px;
height:50px;
border-radius:50%;
background:#aaa;
border:none;
font-size:24px;
color:white;
}

</style>
</head>

<body>

<div id="panel">

<h2>Drums Kit</h2>

<div id="list"></div>

<h2>Cymbals</h2>

<div id="cymbalList"></div>

</div>

<canvas id="canvas"></canvas>

<button id="menuBtn">⋯</button>
<button id="addBtn">＋</button>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth-220
canvas.height=window.innerHeight

let items=[]

function drawGrid(){

let size=50

ctx.strokeStyle="#ccc"

for(let x=0;x<canvas.width;x+=size){
ctx.beginPath()
ctx.moveTo(x,0)
ctx.lineTo(x,canvas.height)
ctx.stroke()
}

for(let y=0;y<canvas.height;y+=size){
ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawGrid()

items.forEach(d=>{

ctx.beginPath()
ctx.arc(d.x,d.y,d.size*2,0,Math.PI*2)
ctx.fillStyle=d.color
ctx.fill()

ctx.strokeStyle="black"
ctx.lineWidth=2
ctx.stroke()

})

updateList()

}

function addDrum(){

items.push({
x:300,
y:200,
size:10,
color:"#fff",
type:"Tom"
})

draw()

}

document.getElementById("addBtn").onclick=addDrum

function updateList(){

let drumHTML=""
let cymHTML=""

items.forEach(d=>{

let text=d.size+"\" "+d.type

if(d.type=="Crash"||d.type=="Ride"||d.type=="Splash"||d.type=="China")
cymHTML+=text+"<br>"
else
drumHTML+=text+"<br>"

})

document.getElementById("list").innerHTML=drumHTML
document.getElementById("cymbalList").innerHTML=cymHTML

}

draw()

</script>

</body>
</html>
