 <!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>

html,body{
margin:0;
overflow:hidden;
touch-action:none;
background:#eee;
font-family:sans-serif;
}

#topbar{
position:absolute;top:0;left:0;width:100%;height:50px;
background:#222;color:#fff;display:flex;align-items:center;
padding:0 10px;gap:10px;z-index:10;
}

#canvas{position:absolute;top:50px;left:0;}

#addBtn{
position:absolute;right:20px;bottom:20px;
width:60px;height:60px;border-radius:50%;
background:#ffd400;font-size:30px;border:none;
}

#overlay{
position:absolute;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.4);display:none;z-index:15;
}

#modal,#editModal{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#fff;padding:20px;border-radius:10px;
display:none;z-index:20;width:260px;
}

.close{
position:absolute;top:5px;right:10px;
font-size:20px;cursor:pointer;
}

</style>
</head>

<body>

<div id="topbar">
<button onclick="toggleGrid()">Grid</button>
<button onclick="save()">保存</button>
<button onclick="load()">読込</button>
</div>

<canvas id="canvas"></canvas>
<button id="addBtn">＋</button>

<div id="overlay"></div>

<div id="modal">
<div class="close" onclick="closeModal()">×</div>
<h3 id="title"></h3>
<div id="content"></div>
</div>

<div id="editModal">
<div class="close" onclick="closeEdit()">×</div>
<h3>編集</h3>

サイズ:<input id="editSize" type="number"><br>
<div id="depthWrap">奥行:<input id="editDepth" type="number"><br></div>

回転:<input id="rotateRange" type="range" min="0" max="360"><br>

<button onclick="applyEdit()">更新</button>
<button onclick="deleteItem()">削除</button>

<hr>

<button onclick="bringFront()">最前面</button>
<button onclick="sendBack()">最背面</button>
<button onclick="forward()">一つ前へ</button>
<button onclick="backward()">一つ後ろへ</button>

</div>

<script>

// ===== ズーム禁止 =====
document.addEventListener('gesturestart', e => e.preventDefault())
document.addEventListener('gesturechange', e => e.preventDefault())
document.addEventListener('gestureend', e => e.preventDefault())

// ===== 基本 =====
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight-50

let items=[]
let selected=null
let grid=true

let dragging=false
let offsetX=0
let offsetY=0

function snap(v){return Math.round(v/50)*50}

// ===== 描画 =====
function drawGrid(){
if(!grid)return
ctx.strokeStyle="#ccc"
for(let x=0;x<canvas.width;x+=50){
ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke()
}
for(let y=0;y<canvas.height;y+=50){
ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke()
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)
drawGrid()

items.forEach(d=>{
ctx.save()
ctx.translate(d.x,d.y)
ctx.rotate((d.rot||0)*Math.PI/180)

let label=""
if(d.type==="Kick") label="BD"
if(d.type==="Snare") label="SD"
if(d.type==="Tom") label="TT"
if(d.type==="Floor Tom") label="FT"

if(d.type==="Kick"){
let w=d.size*4
let h=d.depth*3
ctx.fillStyle="#fff"
ctx.fillRect(-w/2,-h/2,w,h)
ctx.strokeStyle="#000"
ctx.lineWidth=2
ctx.strokeRect(-w/2,-h/2,w,h)

ctx.textAlign="center"
ctx.fillStyle="#000"
ctx.fillText(label,0,-5)
ctx.fillText(`${d.size}"`,0,15)

}else{
let r=d.size*2
ctx.beginPath()
ctx.arc(0,0,r,0,Math.PI*2)
ctx.fillStyle=(["Crash","Ride","HH","Splash","China"].includes(d.type))?"#FFD700":"#fff"
ctx.fill()
ctx.strokeStyle="#000"
ctx.lineWidth=2
ctx.stroke()

ctx.textAlign="center"
ctx.fillStyle="#000"

if(label){
ctx.fillText(label,0,-5)
ctx.fillText(`${d.size}"`,0,15)
}else{
ctx.fillText(d.type,0,-5)
ctx.fillText(`${d.size}"`,0,15)
}
}

ctx.restore()
})
}

// ===== タッチ＆マウス統合 =====

function getPos(e){
if(e.touches){
return {
x:e.touches[0].clientX,
y:e.touches[0].clientY-50
}
}else{
return {
x:e.clientX,
y:e.clientY-50
}
}
}

function start(e){
let pos=getPos(e)
selected=null

for(let i=items.length-1;i>=0;i--){
let d=items[i]
let r=d.size*2.5
if(Math.hypot(d.x-pos.x,d.y-pos.y)<r){
selected=d
dragging=true
offsetX=pos.x-d.x
offsetY=pos.y-d.y
break
}
}
}

function move(e){
if(!dragging || !selected)return

let pos=getPos(e)

selected.x=grid?snap(pos.x-offsetX):pos.x-offsetX
selected.y=grid?snap(pos.y-offsetY):pos.y-offsetY

draw()
}

function end(){
dragging=false
}

// イベント
canvas.addEventListener("mousedown",start)
canvas.addEventListener("mousemove",move)
canvas.addEventListener("mouseup",end)

canvas.addEventListener("touchstart",start)
canvas.addEventListener("touchmove",move)
canvas.addEventListener("touchend",end)

// ===== モーダル =====

function openEdit(d){
selected=d
document.getElementById("editModal").style.display="block"
document.getElementById("overlay").style.display="block"

editSize.value=d.size
rotateRange.value=d.rot||0

if(d.type==="Kick"){
depthWrap.style.display="block"
editDepth.value=d.depth
}else{
depthWrap.style.display="none"
}
}

canvas.addEventListener("dblclick",()=>{
if(selected) openEdit(selected)
})

// ===== レイヤー =====

function bringFront(){
items=items.filter(i=>i!==selected)
items.push(selected)
draw()
}

function sendBack(){
items=items.filter(i=>i!==selected)
items.unshift(selected)
draw()
}

function forward(){
let i=items.indexOf(selected)
if(i<items.length-1){
[items[i],items[i+1]]=[items[i+1],items[i]]
}
draw()
}

function backward(){
let i=items.indexOf(selected)
if(i>0){
[items[i],items[i-1]]=[items[i-1],items[i]]
}
draw()
}

// ===== その他 =====

function applyEdit(){
selected.size=parseInt(editSize.value)
if(selected.type==="Kick"){
selected.depth=parseInt(editDepth.value)
}
selected.rot=parseInt(rotateRange.value)
closeEdit()
draw()
}

function deleteItem(){
items=items.filter(i=>i!==selected)
closeEdit()
draw()
}

function closeEdit(){
editModal.style.display="none"
overlay.style.display="none"
}

function toggleGrid(){grid=!grid;draw()}

function save(){localStorage.setItem("drum",JSON.stringify(items))}
function load(){
let d=localStorage.getItem("drum")
if(d){items=JSON.parse(d);draw()}
}

// ===== 初期描画 =====
draw()

</script>

</body>
</html>
