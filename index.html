<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;font-family:sans-serif;background:#eee;overflow:hidden;}
#panel{
  position:absolute; background:#f5f5f5; padding:10px; box-sizing:border-box; overflow:auto;
  transition:all 0.2s;
}
#canvas{position:absolute; background:#eee;}
button{margin-top:5px;}
input{width:60px;margin:3px 0;}
label{font-size:13px;}
#addBtn{
  position:absolute; right:20px; bottom:20px; width:70px; height:70px;
  border-radius:50%; background:#ffd400; border:none;
  font-size:24px; font-weight:bold; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.3);
  transition:0.2s;
}
#addBtn:hover{transform:scale(1.1);}
</style>
</head>
<body>

<div id="panel">
<h3>Drums Kit</h3>
<div id="list"></div>
<h3>Cymbals</h3>
<div id="cymbalList"></div>
<hr>
<h3>Add Drum/Cymbal</h3>
<label>Type:</label>
<select id="typeSelect">
  <option>Kick</option>
  <option>Snare</option>
  <option>Tom</option>
  <option>Floor Tom</option>
  <option>Crash</option>
  <option>Ride</option>
  <option>HiHat</option>
  <option>Splash</option>
  <option>China</option>
</select><br>
<label>Size (inch):</label><br>
<input id="sizeInput" type="number"><br>
<label id="depthLabel">Depth (inch, Kick only):</label><br>
<input id="depthInput" type="number"><br>
</div>

<canvas id="canvas"></canvas>
<button id="addBtn">＋ Add</button>

<script>
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
const panel=document.getElementById("panel");

// レスポンシブ配置
function resizeCanvas(){
  if(window.innerWidth < window.innerHeight){
    // 縦画面：パネル上部
    panel.style.width="100%";
    panel.style.height="220px";
    panel.style.left="0px";
    panel.style.top="0px";
    canvas.style.left="0px";
    canvas.style.top="220px";
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight-220;
  } else {
    // 横画面：パネル左
    panel.style.width="220px";
    panel.style.height="100%";
    panel.style.left="0px";
    panel.style.top="0px";
    canvas.style.left="220px";
    canvas.style.top="0px";
    canvas.width=window.innerWidth-220;
    canvas.height=window.innerHeight;
  }
  draw();
}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

let items=[];
let dragItem=null, offsetX=0, offsetY=0;

// グリッド
function drawGrid(){
  let size=50; ctx.strokeStyle="#ccc";
  for(let x=0;x<canvas.width;x+=size){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,canvas.height); ctx.stroke();}
  for(let y=0;y<canvas.height;y+=size){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(canvas.width,y); ctx.stroke();}
}

// 描画
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid();
  items.forEach(d=>{
    let label=d.type;
    if(d.type=="Kick") label="BD";
    if(d.type=="Snare") label="SD";
    if(d.type=="Tom") label="TT";
    if(d.type=="Floor Tom") label="FT";

    ctx.lineWidth=3; ctx.strokeStyle="black"; ctx.fillStyle=d.color; ctx.textAlign="center";

    if(d.type=="Kick"){
      let rectWidth=d.size*3, rectHeight=d.depth*2;
      ctx.beginPath(); ctx.rect(d.x-rectWidth/2,d.y-rectHeight/2,rectWidth,rectHeight); ctx.fill(); ctx.stroke();
      ctx.fillStyle="black"; ctx.font="bold 16px sans-serif"; ctx.fillText(d.size+'"×'+d.depth+'"',d.x,d.y-5);
      ctx.font="13px sans-serif"; ctx.fillText(label,d.x,d.y+15);
    } else {
      let r=d.size*2;
      ctx.beginPath(); ctx.arc(d.x,d.y,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
      ctx.fillStyle="black"; ctx.font="bold 14px sans-serif"; ctx.fillText(d.size+'"',d.x,d.y-5);
      ctx.font="12px sans-serif"; ctx.fillText(label,d.x,d.y+12);
    }
  });
  updateList();
}

// リスト更新
function updateList(){
  let drumHTML="", cymHTML="";
  items.forEach(d=>{
    let label=d.type;
    if(d.type=="Kick") label="BD";
    if(d.type=="Snare") label="SD";
    if(d.type=="Tom") label="TT";
    if(d.type=="Floor Tom") label="FT";
    let text=d.size+'" '+label;
    if(["Crash","Ride","HiHat","Splash","China"].includes(d.type)) cymHTML+=text+"<br>";
    else drumHTML+=text+"<br>";
  });
  document.getElementById("list").innerHTML=drumHTML;
  document.getElementById("cymbalList").innerHTML=cymHTML;
}

// ADDボタン
document.getElementById("addBtn").addEventListener("click",()=>{
  const type=document.getElementById("typeSelect").value;
  const size=parseInt(document.getElementById("sizeInput").value);
  const depth=type==="Kick"?parseInt(document.getElementById("depthInput").value):0;
  const color=["Crash","Ride","HiHat","Splash","China"].includes(type)?"#FFD700":"#fff";
  if(!size || (type==="Kick" && !depth)) return alert("サイズを正しく入力してください");

  const x=canvas.width/2, y=canvas.height/2;
  items.push({x,y,type,size,depth,color});
  draw();
});

// ドラッグ
canvas.addEventListener("mousedown",e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  for(let i=items.length-1;i>=0;i--){
    const d=items[i], hit = (d.type=="Kick") ?
      (mx>d.x-d.size*1.5 && mx<d.x+d.size*1.5 && my>d.y-d.depth && my<d.y+d.depth) :
      (Math.hypot(mx-d.x,my-d.y)<d.size*2);
    if(hit){ dragItem=d; offsetX=mx-d.x; offsetY= my-d.y; break;}
  }
});
canvas.addEventListener("mousemove", e=>{
  if(dragItem){
    const rect=canvas.getBoundingClientRect();
    dragItem.x=e.clientX-rect.left-offsetX;
    dragItem.y=e.clientY-rect.top-offsetY;
    draw();
  }
});
canvas.addEventListener("mouseup",()=>{dragItem=null;});
canvas.addEventListener("mouseleave",()=>{dragItem=null;});

// Depth欄表示制御
const typeSelect=document.getElementById("typeSelect");
const depthLabel=document.getElementById("depthLabel");
const depthInput=document.getElementById("depthInput");
typeSelect.addEventListener("change",()=>{
  if(typeSelect.value==="Kick"){ depthLabel.style.display="block"; depthInput.style.display="block"; }
  else{ depthLabel.style.display="none"; depthInput.style.display="none"; }
});
</script>
</body>
</html>
