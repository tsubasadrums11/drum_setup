<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{margin:0;background:#eee;font-family:sans-serif;overflow:hidden;}

#canvas{position:absolute;top:0;left:0;}

#addBtn{
position:absolute;
right:20px;
bottom:20px;
width:60px;
height:60px;
border-radius:50%;
background:#ffd400;
font-size:30px;
border:none;
}

/* モーダル */
#menu{
position:absolute;
bottom:100px;
right:20px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
display:none;
}

#menu button{
display:block;
width:120px;
margin:5px 0;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<button id="addBtn">＋</button>

<div id="menu">
<button onclick="selectType('Kick')">Kick</button>
<button onclick="selectType('Snare')">Snare</button>
<button onclick="selectType('Tom')">Tom</button>
<button onclick="selectType('Floor Tom')">Floor Tom</button>
<button onclick="selectType('Crash')">Crash</button>
<button onclick="selectType('Ride')">Ride</button>
<button onclick="selectType('Splash')">Splash</button>
<button onclick="selectType('China')">China</button>
</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let items=[]
let drag=null
let grid=true

function getLabel(type){
if(type==="Kick") return "BD"
if(type==="Snare") return "SD"
if(type==="Tom") return "TT"
if(type==="Floor Tom") return "FT"
return type
}

function drawGrid(){
if(!grid)return
ctx.strokeStyle="#ccc"
for(let x=0;x<canvas.width;x+=50){
ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke()
}
for(let y=0;y<canvas.height;y+=50){
ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke()
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)
drawGrid()

items.forEach(d=>{

let label=getLabel(d.type)

if(d.type==="Kick"){
let w=d.size*4
let h=d.depth*3

ctx.beginPath()
ctx.rect(d.x-w/2,d.y-h/2,w,h)
ctx.fillStyle=d.color
ctx.fill()
ctx.stroke()

ctx.textAlign="center"
ctx.fillStyle="black"

ctx.font="bold 16px sans-serif"
ctx.fillText(`${d.size}"×${d.depth}"`,d.x,d.y-5)

ctx.font="12px sans-serif"
ctx.fillText(label,d.x,d.y+15)

}else{

let r=d.size*2
ctx.beginPath()
ctx.arc(d.x,d.y,r,0,Math.PI*2)
ctx.fillStyle=d.color
ctx.fill()
ctx.stroke()

ctx.textAlign="center"
ctx.fillStyle="black"

ctx.font="bold 14px sans-serif"
ctx.fillText(`${d.size}"`,d.x,d.y-5)

ctx.font="12px sans-serif"
ctx.fillText(label,d.x,d.y+12)
}

})
}

// ＋ボタン
document.getElementById("addBtn").onclick=()=>{
let menu=document.getElementById("menu")
menu.style.display = menu.style.display==="none" ? "block" : "none"
}

// 種類選択
function selectType(type){

let size=parseInt(prompt("サイズ（インチ）"))
if(!size)return

let depth=18
if(type==="Kick"){
depth=parseInt(prompt("奥行き"))
}

let color="#fff"
if(type==="Crash"||type==="Ride"||type==="Splash"||type==="China"){
color="#FFD700"
}

items.push({
x:200,
y:200,
type:type,
size:size,
depth:depth,
color:color
})

document.getElementById("menu").style.display="none"

draw()
}

// ドラッグ
canvas.onmousedown=e=>{
let x=e.clientX
let y=e.clientY

items.forEach(d=>{
let r=d.size*2
if(Math.hypot(d.x-x,d.y-y)<r){
drag=d
}
})
}

canvas.onmousemove=e=>{
if(drag){
drag.x=e.clientX
drag.y=e.clientY
draw()
}
}

canvas.onmouseup=()=>drag=null

draw()

</script>

</body>
</html>
