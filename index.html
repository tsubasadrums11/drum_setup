<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drum Setup Manager</title>

<style>

body{
margin:0;
background:#111;
color:white;
font-family:sans-serif;
}

#toolbar{
background:#222;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:6px;
}

button,select,input{
padding:6px;
border-radius:6px;
border:none;
}

button{
background:#444;
color:white;
}

canvas{
display:block;
background:#1a1a1a;
touch-action:none;
}

</style>
</head>

<body>

<div id="toolbar">

<select id="type">
<option>Tom</option>
<option>Floor Tom</option>
<option>Snare</option>
<option>Kick</option>
<option>Crash</option>
<option>Ride</option>
<option>Splash</option>
<option>China</option>
<option>Stack</option>
<option>HiHat</option>
</select>

<input id="size" type="number" value="10"> inch

<input id="color" type="color" value="#ffffff">

<button onclick="addItem()">追加</button>
<button onclick="deleteItem()">削除</button>
<button onclick="resetItems()">リセット</button>
<button onclick="savePNG()">PNG保存</button>

</div>

<canvas id="canvas"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let items=[]
let selected=null
let dragging=false

function resizeCanvas(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight-70
draw()
}

window.addEventListener("resize",resizeCanvas)

resizeCanvas()

function addItem(){

let type=document.getElementById("type").value
let size=parseFloat(document.getElementById("size").value)
let color=document.getElementById("color").value

items.push({
x:canvas.width/2,
y:canvas.height/2,
size:size,
color:color,
type:type
})

draw()

}

function deleteItem(){

if(selected!==null){
items.splice(selected,1)
selected=null
draw()
}

}

function resetItems(){

items=[]
selected=null
draw()

}

function savePNG(){

let link=document.createElement("a")
link.download="drum_setup.png"
link.href=canvas.toDataURL()
link.click()

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

items.forEach((d,i)=>{

let r=d.size*3

ctx.beginPath()
ctx.arc(d.x,d.y,r,0,Math.PI*2)

ctx.fillStyle=d.color
ctx.fill()

ctx.lineWidth=2
ctx.strokeStyle=i===selected?"yellow":"white"
ctx.stroke()

ctx.fillStyle="white"
ctx.font="12px sans-serif"
ctx.fillText(d.type+" "+d.size+'"',d.x-r,d.y-r-5)

})

}

function getMousePos(e){

const rect=canvas.getBoundingClientRect()

return{
x:e.clientX-rect.left,
y:e.clientY-rect.top
}

}

canvas.addEventListener("mousedown",e=>{

let pos=getMousePos(e)

selected=null

items.forEach((d,i)=>{

let r=d.size*3

let dist=Math.hypot(pos.x-d.x,pos.y-d.y)

if(dist<r){
selected=i
dragging=true
}

})

draw()

})

canvas.addEventListener("mousemove",e=>{

if(!dragging||selected===null) return

let pos=getMousePos(e)

items[selected].x=pos.x
items[selected].y=pos.y

draw()

})

canvas.addEventListener("mouseup",()=>{

dragging=false

})

canvas.addEventListener("touchstart",e=>{

let rect=canvas.getBoundingClientRect()

let x=e.touches[0].clientX-rect.left
let y=e.touches[0].clientY-rect.top

selected=null

items.forEach((d,i)=>{

let r=d.size*3

let dist=Math.hypot(x-d.x,y-d.y)

if(dist<r){
selected=i
dragging=true
}

})

draw()

})

canvas.addEventListener("touchmove",e=>{

if(!dragging||selected===null) return

let rect=canvas.getBoundingClientRect()

items[selected].x=e.touches[0].clientX-rect.left
items[selected].y=e.touches[0].clientY-rect.top

draw()

})

canvas.addEventListener("touchend",()=>{

dragging=false

})

draw()

</script>

</body>
</html>
