<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>

body{margin:0;font-family:sans-serif;background:#eee;overflow:hidden;}

#topbar{
position:absolute;top:0;left:0;width:100%;height:50px;
background:#222;color:white;display:flex;align-items:center;
padding:0 10px;gap:10px;z-index:10;
}

#canvas{position:absolute;top:50px;left:0;}

button{padding:5px 10px;}

#addBtn{
position:absolute;right:20px;bottom:20px;
width:60px;height:60px;border-radius:50%;
background:#ffd400;font-size:30px;border:none;
}

/* モーダル */
#modal,#editModal{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
background:white;padding:20px;border-radius:10px;
display:none;z-index:20;width:260px;
}

#overlay{
position:absolute;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.4);display:none;z-index:15;
}

</style>
</head>

<body>

<div id="topbar">
<button onclick="toggleGrid()">Grid</button>
<button onclick="save()">保存</button>
<button onclick="load()">読込</button>
<button onclick="exportPNG()">PNG</button>
</div>

<canvas id="canvas"></canvas>
<button id="addBtn">＋</button>

<div id="overlay"></div>

<div id="modal"></div>

<div id="editModal">
<h3>編集</h3>
サイズ:<input id="editSize" type="number"><br>
<div id="depthWrap">奥行き:<input id="editDepth" type="number"><br></div>
<button onclick="applyEdit()">更新</button>
<button onclick="deleteItem()">削除</button>
<button onclick="rotateItem()">回転</button>
</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight-50

let items=[]
let drag=null
let selected=null
let grid=true

function snap(v){
return Math.round(v/50)*50
}

function getLabel(type){
if(type==="Kick") return "BD"
if(type==="Snare") return "SD"
if(type==="Tom") return "TT"
if(type==="Floor Tom") return "FT"
return type
}

function drawGrid(){
if(!grid)return
ctx.strokeStyle="#ccc"
for(let x=0;x<canvas.width;x+=50){
ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke()
}
for(let y=0;y<canvas.height;y+=50){
ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke()
}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)
drawGrid()

// 左上リスト
ctx.fillStyle="black"
ctx.font="12px sans-serif"
let y=20
items.forEach(d=>{
ctx.fillText(`${d.size}" ${getLabel(d.type)}`,10,y)
y+=15
})

items.forEach(d=>{

ctx.save()
ctx.translate(d.x,d.y)
ctx.rotate((d.rot||0)*Math.PI/180)

let label=getLabel(d.type)

if(d.type==="Kick"){
let w=d.size*4
let h=d.depth*3

ctx.beginPath()
ctx.rect(-w/2,-h/2,w,h)
ctx.fillStyle=d.color
ctx.fill()
ctx.stroke()

ctx.textAlign="center"
ctx.fillStyle="black"

ctx.font="bold 16px sans-serif"
ctx.fillText(`${d.size}"×${d.depth}"`,0,-5)
ctx.font="12px sans-serif"
ctx.fillText(label,0,15)

}else{

let r=d.size*2
ctx.beginPath()
ctx.arc(0,0,r,0,Math.PI*2)
ctx.fillStyle=d.color
ctx.fill()
ctx.stroke()

ctx.textAlign="center"
ctx.fillStyle="black"

ctx.font="bold 14px sans-serif"
ctx.fillText(`${d.size}"`,0,-5)
ctx.font="12px sans-serif"
ctx.fillText(label,0,12)
}

ctx.restore()

})

}

// ===== 追加UI =====
document.getElementById("addBtn").onclick=()=>{
let type=prompt("Kick / Snare / Tom / Floor Tom / Crash / Ride")
if(!type)return
let size=parseInt(prompt("サイズ"))
let depth=18
if(type==="Kick") depth=parseInt(prompt("奥行き"))||18

let color="#fff"
if(type==="Crash"||type==="Ride") color="#FFD700"

items.push({x:200,y:200,type,size,depth,color,rot:0})
draw()
}

// ===== ドラッグ & タップ =====
canvas.onmousedown=e=>{
let x=e.clientX
let y=e.clientY-50

selected=null

items.forEach(d=>{
let r=d.size*2
if(Math.hypot(d.x-x,d.y-y)<r){
drag=d
selected=d
}
})
}

canvas.onmousemove=e=>{
if(drag){
drag.x=grid?snap(e.clientX):e.clientX
drag.y=grid?snap(e.clientY-50):e.clientY-50
draw()
}
}

canvas.onmouseup=e=>{
if(drag){
drag=null
}else if(selected){
openEdit(selected)
}
}

// ===== 編集 =====

function openEdit(d){
selected=d
document.getElementById("overlay").style.display="block"
document.getElementById("editModal").style.display="block"

document.getElementById("editSize").value=d.size

if(d.type==="Kick"){
document.getElementById("depthWrap").style.display="block"
document.getElementById("editDepth").value=d.depth
}else{
document.getElementById("depthWrap").style.display="none"
}
}

function applyEdit(){
selected.size=parseInt(document.getElementById("editSize").value)

if(selected.type==="Kick"){
selected.depth=parseInt(document.getElementById("editDepth").value)
}

closeEdit()
draw()
}

function deleteItem(){
items=items.filter(i=>i!==selected)
closeEdit()
draw()
}

function rotateItem(){
selected.rot=(selected.rot||0)+15
draw()
}

function closeEdit(){
document.getElementById("overlay").style.display="none"
document.getElementById("editModal").style.display="none"
}

// ===== 機能 =====

function toggleGrid(){grid=!grid;draw()}

function save(){localStorage.setItem("drum",JSON.stringify(items))}
function load(){
let d=localStorage.getItem("drum")
if(d){items=JSON.parse(d);draw()}
}

function exportPNG(){
let link=document.createElement("a")
link.download="drum.png"
link.href=canvas.toDataURL()
link.click()
}

draw()

</script>

</body>
</html>
