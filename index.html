<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:sans-serif;
background:#eee;
overflow:hidden;
}

#panel{
position:absolute;
left:0;
top:0;
width:220px;
height:100%;
background:#f5f5f5;
padding:15px;
box-sizing:border-box;
overflow:auto;
}

#canvas{
position:absolute;
left:220px;
top:0;
}

#addBtn{
position:absolute;
right:20px;
bottom:20px;
width:60px;
height:60px;
border-radius:50%;
background:#ffd400;
border:none;
font-size:32px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

</style>
</head>

<body>

<div id="panel">

<h3>Drums Kit</h3>
<div id="list"></div>

<h3>Cymbals</h3>
<div id="cymbalList"></div>

</div>

<canvas id="canvas"></canvas>

<button id="addBtn">＋</button>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth-220
canvas.height=window.innerHeight

let items=[

{x:400,y:300,type:"Kick",size:22,depth:18,color:"#ddd"},
{x:400,y:200,type:"Snare",size:14,color:"#fff"},
{x:300,y:150,type:"Tom",size:10,color:"#fff"},
{x:450,y:150,type:"Tom",size:12,color:"#fff"},
{x:550,y:300,type:"Floor Tom",size:16,color:"#fff"},
{x:250,y:80,type:"Crash",size:18,color:"#FFD700"},
{x:500,y:70,type:"Ride",size:20,color:"#FFD700"}

]

function drawGrid(){

let size=50
ctx.strokeStyle="#ccc"

for(let x=0;x<canvas.width;x+=size){
ctx.beginPath()
ctx.moveTo(x,0)
ctx.lineTo(x,canvas.height)
ctx.stroke()
}

for(let y=0;y<canvas.height;y+=size){
ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()
}

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

drawGrid()

items.forEach(d=>{

let label=d.type

if(d.type==="Kick") label="BD"
if(d.type==="Snare") label="SD"
if(d.type==="Tom") label="TT"
if(d.type==="Floor Tom") label="FT"

if(d.type==="Kick"){

let w=d.size*4
let h=d.depth*3

ctx.beginPath()
ctx.rect(d.x-w/2,d.y-h/2,w,h)

ctx.fillStyle=d.color
ctx.fill()

ctx.lineWidth=3
ctx.strokeStyle="black"
ctx.stroke()

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.font="bold 16px sans-serif"
ctx.fillText(`${d.size}"×${d.depth}"`,d.x,d.y-5)

ctx.font="13px sans-serif"
ctx.fillText(label,d.x,d.y+15)

}

else{

let r=d.size*2

ctx.beginPath()
ctx.arc(d.x,d.y,r,0,Math.PI*2)

ctx.fillStyle=d.color
ctx.fill()

ctx.lineWidth=3
ctx.strokeStyle="black"
ctx.stroke()

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.font="bold 14px sans-serif"
ctx.fillText(`${d.size}"`,d.x,d.y-5)

ctx.font="12px sans-serif"
ctx.fillText(label,d.x,d.y+12)

}

})

updateList()

}

function updateList(){

let drumHTML=""
let cymHTML=""

items.forEach(d=>{

let label=d.type

if(d.type==="Kick") label="BD"
if(d.type==="Snare") label="SD"
if(d.type==="Tom") label="TT"
if(d.type==="Floor Tom") label="FT"

let text=d.size+'" '+label

if(
d.type==="Crash"||
d.type==="Ride"||
d.type==="Splash"||
d.type==="China"||
d.type==="HiHat"
){
cymHTML+=text+"<br>"
}else{
drumHTML+=text+"<br>"
}

})

document.getElementById("list").innerHTML=drumHTML
document.getElementById("cymbalList").innerHTML=cymHTML

}

draw()

</script>

</body>
</html>
