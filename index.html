<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Drum Setup Pro</title>

<style>

body{
margin:0;
font-family:sans-serif;
background:#111;
color:white;
}

#toolbar{
background:#222;
padding:10px;
display:flex;
flex-wrap:wrap;
gap:6px;
}

button,select,input{
padding:6px;
border-radius:6px;
border:none;
}

button{
background:#444;
color:white;
}

#canvas{
background:#1a1a1a;
touch-action:none;
}

</style>
</head>

<body>

<div id="toolbar">

<select id="type">
<option>Tom</option>
<option>FloorTom</option>
<option>Snare</option>
<option>Kick</option>
<option>Crash</option>
<option>Ride</option>
<option>Splash</option>
<option>China</option>
<option>Stack</option>
<option>HiHat</option>
</select>

<input id="size" type="number" value="10">inch
<input id="color" type="color" value="#ffffff">

<button onclick="addItem()">追加</button>
<button onclick="deleteItem()">削除</button>

<button onclick="toggleGrid()">Grid</button>
<button onclick="toggleStand()">Stand</button>

<input id="setupName" placeholder="セット名">

<button onclick="saveSetup()">保存</button>
<button onclick="loadSetup()">読込</button>

<button onclick="savePNG()">PNG</button>

</div>

<canvas id="canvas" width="900" height="600"></canvas>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

let items=[]
let drag=null
let selected=null
let grid=true
let stand=true

function addItem(){

let type=document.getElementById("type").value
let size=parseFloat(document.getElementById("size").value)
let color=document.getElementById("color").value

items.push({
x:200,
y:200,
size:size,
color:color,
type:type
})

draw()

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

if(grid){
ctx.strokeStyle="#333"

for(let x=0;x<canvas.width;x+=50){
ctx.beginPath()
ctx.moveTo(x,0)
ctx.lineTo(x,canvas.height)
ctx.stroke()
}

for(let y=0;y<canvas.height;y+=50){
ctx.beginPath()
ctx.moveTo(0,y)
ctx.lineTo(canvas.width,y)
ctx.stroke()
}

}

items.forEach(d=>{

let r=d.size3

if(stand && d.type!=="Kick"){

ctx.strokeStyle="#888"
ctx.beginPath()
ctx.moveTo(d.x,d.y)
ctx.lineTo(d.x,d.y+50)
ctx.stroke()

}

ctx.beginPath()
ctx.arc(d.x,d.y,r,0,Math.PI2)

ctx.fillStyle=d.color
ctx.fill()

ctx.strokeStyle=selected===d ? "yellow":"white"
ctx.lineWidth=2
ctx.stroke()

ctx.fillStyle="white"
ctx.font="12px sans-serif"

ctx.fillText(d.type+" "+d.size+'"',d.x-r,d.y-r-4)

})

}

canvas.onmousedown=e=>selectItem(e.offsetX,e.offsetY)
canvas.onmousemove=e=>moveItem(e.offsetX,e.offsetY)
canvas.onmouseup=()=>drag=null

canvas.ontouchstart=e=>{

let rect=canvas.getBoundingClientRect()

let x=e.touches[0].clientX-rect.left
let y=e.touches[0].clientY-rect.top

selectItem(x,y)

}

canvas.ontouchmove=e=>{

if(!drag)return

let rect=canvas.getBoundingClientRect()

drag.x=e.touches[0].clientX-rect.left
drag.y=e.touches[0].clientY-rect.top

draw()

}

canvas.ontouchend=()=>drag=null

function selectItem(x,y){

selected=null

items.forEach(d=>{

let r=d.size3

let dx=x-d.x
let dy=y-d.y

if(Math.sqrt(dxdx+dy*dy)<r){

drag=d
selected=d

}

})

draw()

}

function moveItem(x,y){

if(drag){

drag.x=x
drag.y=y

draw()

}

}

function deleteItem(){

if(!selected)return

items=items.filter(i=>i!==selected)
selected=null

draw()

}

function toggleGrid(){

grid=!grid
draw()

}

function toggleStand(){

stand=!stand
draw()

}

function saveSetup(){

let name=document.getElementById("setupName").value

if(!name){
alert("セット名入力")
return
}

localStorage.setItem("drum_"+name,JSON.stringify(items))

alert("保存しました")

}

function loadSetup(){

let name=document.getElementById("setupName").value

let data=localStorage.getItem("drum_"+name)

if(data){

items=JSON.parse(data)
draw()

}

}

function savePNG(){

let link=document.createElement("a")

link.download="drumsetup.png"
link.href=canvas.toDataURL()

link.click()

}

draw()

</script>

</body>
</html>
