<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{margin:0;font-family:sans-serif;background:#eee;overflow:hidden;}

#panel{
position:absolute;left:0;top:0;width:230px;height:100%;
background:#f5f5f5;padding:10px;overflow:auto;
}

#canvas{position:absolute;left:230px;top:0;}

button{margin:3px;}

#addBtn{
position:absolute;right:20px;bottom:20px;
width:60px;height:60px;border-radius:50%;
background:#ffd400;border:none;font-size:32px;
}
</style>
</head>

<body>

<div id="panel">
<h3>Drums</h3>
<div id="list"></div>

<button onclick="addItem()">＋追加</button>
<button onclick="toggleGrid()">Grid</button>
<button onclick="save()">保存</button>
<button onclick="load()">読込</button>
</div>

<canvas id="canvas"></canvas>
<button id="addBtn" onclick="addItem()">＋</button>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth-230
canvas.height=window.innerHeight

let items=[]
let grid=true
let drag=null

function getLabel(type){
if(type==="Kick") return "BD"
if(type==="Snare") return "SD"
if(type==="Tom") return "TT"
if(type==="Floor Tom") return "FT"
return type
}

function drawGrid(){
if(!grid)return
ctx.strokeStyle="#ccc"
for(let x=0;x<canvas.width;x+=50){
ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke()
}
for(let y=0;y<canvas.height;y+=50){
ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke()
}
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)
drawGrid()

items.forEach(d=>{

let label=getLabel(d.type)

if(d.type==="Kick"){
let w=d.size*4
let h=d.depth*3

ctx.beginPath()
ctx.rect(d.x-w/2,d.y-h/2,w,h)
ctx.fillStyle=d.color
ctx.fill()
ctx.stroke()

ctx.textAlign="center"
ctx.fillStyle="black"

ctx.font="bold 16px sans-serif"
ctx.fillText(`${d.size}"×${d.depth}"`,d.x,d.y-5)

ctx.font="12px sans-serif"
ctx.fillText(label,d.x,d.y+15)

}else{

let r=d.size*2
ctx.beginPath()
ctx.arc(d.x,d.y,r,0,Math.PI*2)
ctx.fillStyle=d.color
ctx.fill()
ctx.stroke()

ctx.textAlign="center"
ctx.fillStyle="black"

ctx.font="bold 14px sans-serif"
ctx.fillText(`${d.size}"`,d.x,d.y-5)

ctx.font="12px sans-serif"
ctx.fillText(label,d.x,d.y+12)
}

})

updateList()
}

function addItem(){

let type=prompt("種類\nKick / Snare / Tom / Floor Tom / Crash / Ride")

if(!type)return

let size=parseInt(prompt("サイズ(インチ)"))
if(!size)return

let depth=18
if(type==="Kick"){
depth=parseInt(prompt("奥行き"))
}

let color=prompt("色(hex)", "#ffffff")

items.push({
x:300,
y:200,
type:type,
size:size,
depth:depth,
color:color
})

draw()
}

function updateList(){
let html=""
items.forEach(d=>{
html+=`${d.size}" ${getLabel(d.type)}<br>`
})
document.getElementById("list").innerHTML=html
}

function toggleGrid(){
grid=!grid
draw()
}

function save(){
localStorage.setItem("drumSet",JSON.stringify(items))
alert("保存した")
}

function load(){
let data=localStorage.getItem("drumSet")
if(data){
items=JSON.parse(data)
draw()
}
}

canvas.onmousedown=e=>{
let rect=canvas.getBoundingClientRect()
let x=e.clientX-rect.left
let y=e.clientY-rect.top

items.forEach(d=>{
let r=d.size*2
if(Math.hypot(d.x-x,d.y-y)<r){
drag=d
}
})
}

canvas.onmousemove=e=>{
if(drag){
let rect=canvas.getBoundingClientRect()
drag.x=e.clientX-rect.left
drag.y=e.clientY-rect.top
draw()
}
}

canvas.onmouseup=()=>drag=null

draw()

</script>

</body>
</html>
