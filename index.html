<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<style>
html,body{margin:0;overflow:hidden;background:#eee;font-family:sans-serif;touch-action:none;}
#topbar{position:absolute;top:0;width:100%;height:50px;background:#222;color:#fff;display:flex;gap:10px;align-items:center;padding:0 10px;z-index:10;}
#canvas{position:absolute;top:50px;left:0;}
#addBtn{position:absolute;right:20px;bottom:20px;width:60px;height:60px;border-radius:50%;background:#ffd400;font-size:30px;border:none;z-index:10;}
#overlay{position:absolute;width:100%;height:100%;background:rgba(0,0,0,0.4);display:none;z-index:15;}
.modal{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border-radius:10px;display:none;width:260px;z-index:20;}
.close{position:absolute;right:10px;top:5px;cursor:pointer;}
input,button{margin:5px 0;}
</style>
</head>

<body>

<div id="topbar">
<button onclick="draw()">Grid</button>
<button onclick="save()">保存</button>
<button onclick="load()">読込</button>
<button onclick="exportPNG()">PNG</button>
</div>

<canvas id="canvas"></canvas>
<button id="addBtn">＋</button>

<div id="overlay"></div>

<div id="modal" class="modal">
<div class="close" onclick="closeModal()">×</div>
<h3 id="modalTitle"></h3>
<div id="modalContent"></div>
</div>

<div id="editModal" class="modal">
<div class="close" onclick="closeEdit()">×</div>
<h3>編集</h3>
口径(インチ)<input id="editSize" type="number"><br>
<div id="depthWrap">深さ(インチ)<input id="editDepth" type="number"><br></div>
回転<input type="range" id="rotateRange" min="0" max="360"><br>
角度<input id="rotateInput" type="number"><br>

<button onclick="applyEdit()">更新</button>
<button onclick="deleteItem()">削除</button>

<hr>
<button onclick="bringFront()">最前面</button>
<button onclick="sendBack()">最背面</button>
<button onclick="forward()">一つ前</button>
<button onclick="backward()">一つ後ろ</button>
</div>

<script>
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")
canvas.width=innerWidth
canvas.height=innerHeight-50

let items=[]
let selected=null
let dragging=false
let offsetX=0,offsetY=0

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height)

// grid
ctx.strokeStyle="#ccc"
for(let x=0;x<canvas.width;x+=50){
ctx.beginPath();ctx.moveTo(x+0.5,0);ctx.lineTo(x+0.5,canvas.height);ctx.stroke()
}
for(let y=0;y<canvas.height;y+=50){
ctx.beginPath();ctx.moveTo(0,y+0.5);ctx.lineTo(canvas.width,y+0.5);ctx.stroke()
}

// items
items.forEach(d=>{
ctx.save()
ctx.translate(d.x,d.y)
ctx.rotate((d.rot||0)*Math.PI/180)

// ハイライト
if(d===selected){
ctx.beginPath()
ctx.arc(0,0,d.size*2.8,0,Math.PI*2)
ctx.fillStyle="rgba(0,150,255,0.2)"
ctx.fill()
}

let label={Kick:"BD",Snare:"SD",Tom:"TT","Floor Tom":"FT"}[d.type]||d.type

if(d.type==="Kick"){
let w=d.size*4
let h=d.depth*3*1.5
ctx.fillStyle="#fff"
ctx.fillRect(-w/2,-h/2,w,h)
ctx.strokeStyle="#000"
ctx.strokeRect(-w/2,-h/2,w,h)

ctx.fillStyle="#000"
ctx.textAlign="center"
ctx.fillText(label,0,-5)
ctx.fillText(d.size+'"',0,15)

}else{
let r=d.size*2
ctx.beginPath()
ctx.arc(0,0,r,0,Math.PI*2)
ctx.fillStyle=(["Crash","Ride","HH","Splash","China"].includes(d.type))?"#FFD700":"#fff"
ctx.fill()
ctx.stroke()

ctx.fillStyle="#000"
ctx.fillText(label,0,-5)
ctx.fillText(d.size+'"',0,15)
}

ctx.restore()
})
}

// 移動
canvas.onpointerdown=e=>{
let x=e.offsetX,y=e.offsetY
selected=null

for(let i=items.length-1;i>=0;i--){
let d=items[i]
if(Math.hypot(d.x-x,d.y-y)<d.size*2.5){
selected=d
dragging=true
offsetX=x-d.x
offsetY=y-d.y
break
}
}
draw()
}

canvas.onpointermove=e=>{
if(!selected||!dragging)return
let x=e.offsetX,y=e.offsetY
selected.x=x-offsetX
selected.y=y-offsetY
draw()
}

canvas.onpointerup=()=>{dragging=false}

// タップ編集
canvas.onclick=()=>{
if(selected) openEdit(selected)
}

// 編集
function openEdit(d){
editModal.style.display="block"
overlay.style.display="block"

editSize.value=d.size
rotateRange.value=d.rot||0
rotateInput.value=d.rot||0

if(d.type==="Kick"){
depthWrap.style.display="block"
editDepth.value=d.depth
}else{
depthWrap.style.display="none"
}
}

function applyEdit(){
selected.size=parseInt(editSize.value)
if(selected.type==="Kick"){
selected.depth=parseInt(editDepth.value)
}
draw()
closeEdit()
}

function deleteItem(){
items=items.filter(i=>i!==selected)
selected=null
draw()
closeEdit()
}

// layer
function bringFront(){items=items.filter(i=>i!==selected);items.push(selected);draw()}
function sendBack(){items=items.filter(i=>i!==selected);items.unshift(selected);draw()}
function forward(){let i=items.indexOf(selected);if(i<items.length-1){[items[i],items[i+1]]=[items[i+1],items[i]]}draw()}
function backward(){let i=items.indexOf(selected);if(i>0){[items[i],items[i-1]]=[items[i-1],items[i]]}draw()}

// 回転（UIのみ）
rotateRange.oninput=()=>{
if(selected){
selected.rot=parseInt(rotateRange.value)
rotateInput.value=rotateRange.value
draw()
}
}

rotateInput.oninput=()=>{
if(selected){
selected.rot=parseInt(rotateInput.value)
rotateRange.value=rotateInput.value
draw()
}
}

// 追加UI
addBtn.onclick=()=>{
modal.style.display="block"
overlay.style.display="block"
modalTitle.innerText="追加"

modalContent.innerHTML=`
<button onclick="selectType('drum')">太鼓</button>
<button onclick="selectType('cymbal')">シンバル</button>
`
}

function selectType(type){
if(type==="drum"){
modalContent.innerHTML=`
<button onclick="createDrum('Kick')">バスドラ</button>
<button onclick="createDrum('Snare')">スネア</button>
<button onclick="createDrum('Tom')">タム</button>
<button onclick="createDrum('Floor Tom')">フロアタム</button>
`
}else{
modalContent.innerHTML=`
<button onclick="createCymbal('Crash')">Crash</button>
<button onclick="createCymbal('Ride')">Ride</button>
<button onclick="createCymbal('HH')">HH</button>
<button onclick="createCymbal('Splash')">Splash</button>
<button onclick="createCymbal('China')">China</button>
`
}
}

function createDrum(type){
modalContent.innerHTML=`
口径(インチ)<input id="size"><br>
${type==="Kick"?'深さ(インチ)<input id="depth"><br>':''}
<button onclick="addItem('${type}')">追加</button>
`
}

function createCymbal(type){
modalContent.innerHTML=`
口径(インチ)<input id="size"><br>
<button onclick="addItem('${type}')">追加</button>
`
}

function addItem(type){
let size=parseInt(document.getElementById("size").value)
let depth=document.getElementById("depth")?parseInt(document.getElementById("depth").value):0

items.push({
type:type,
size:size,
depth:depth,
x:canvas.width/2,
y:canvas.height/2,
rot:0
})

draw()
closeModal()
}

// modal
function closeModal(){modal.style.display="none";overlay.style.display="none"}
function closeEdit(){editModal.style.display="none";overlay.style.display="none"}

// save
function save(){localStorage.setItem("drum",JSON.stringify(items))}
function load(){items=JSON.parse(localStorage.getItem("drum")||"[]");draw()}
function exportPNG(){
let a=document.createElement("a")
a.href=canvas.toDataURL()
a.download="drum.png"
a.click()
}

draw()
</script>

</body>
</html>
