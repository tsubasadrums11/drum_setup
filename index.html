<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>

body{margin:0;background:#eee;overflow:hidden;font-family:sans-serif;}

#topbar{
position:absolute;top:0;left:0;width:100%;height:50px;
background:#222;color:#fff;display:flex;align-items:center;
padding:0 10px;gap:10px;z-index:10;
}

#canvas{position:absolute;top:50px;left:0;}

#addBtn{
position:absolute;right:20px;bottom:20px;
width:60px;height:60px;border-radius:50%;
background:#ffd400;font-size:30px;border:none;
}

#overlay{
position:absolute;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.4);display:none;z-index:15;
}

#modal,#editModal{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
background:#fff;padding:20px;border-radius:10px;
display:none;z-index:20;width:260px;
}

.close{
position:absolute;top:5px;right:10px;
font-size:20px;cursor:pointer;
}

</style>
</head>

<body>

<div id="topbar">
<button onclick="toggleGrid()">Grid</button>
<button onclick="save()">保存</button>
<button onclick="load()">読込</button>
</div>

<canvas id="canvas"></canvas>
<button id="addBtn">＋</button>

<div id="overlay"></div>

<!-- 追加モーダル -->
<div id="modal">
<div class="close" onclick="closeModal()">×</div>
<h3 id="title"></h3>
<div id="content"></div>
</div>

<!-- 編集モーダル -->
<div id="editModal">
<div class="close" onclick="closeEdit()">×</div>
<h3>編集</h3>

サイズ:<input id="editSize" type="number"><br>
<div id="depthWrap">奥行:<input id="editDepth" type="number"><br></div>

回転:<input id="rotateRange" type="range" min="0" max="360"><br>

<button onclick="applyEdit()">更新</button>
<button onclick="deleteItem()">削除</button>

</div>

<script>

const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight-50

let items=[]
let drag=null
let selected=null
let grid=true

function snap(v){return Math.round(v/50)*50}

// ===== 描画 =====

function drawGrid(){
if(!grid)return
ctx.strokeStyle="#ccc"
for(let x=0;x<canvas.width;x+=50){
ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke()
}
for(let y=0;y<canvas.height;y+=50){
ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke()
}
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)
drawGrid()

items.forEach(d=>{

ctx.save()
ctx.translate(d.x,d.y)
ctx.rotate((d.rot||0)*Math.PI/180)

let label=""
if(d.type==="Kick") label="BD"
if(d.type==="Snare") label="SD"
if(d.type==="Tom") label="TT"
if(d.type==="Floor Tom") label="FT"

if(d.type==="Kick"){
let w=d.size*4
let h=d.depth*3

ctx.fillStyle="#fff"
ctx.fillRect(-w/2,-h/2,w,h)

ctx.strokeStyle="#000"
ctx.lineWidth=2
ctx.strokeRect(-w/2,-h/2,w,h)

ctx.textAlign="center"
ctx.fillStyle="#000"

ctx.fillText(label,0,-5)
ctx.fillText(`${d.size}"`,0,15)

}else{

let r=d.size*2

ctx.beginPath()
ctx.arc(0,0,r,0,Math.PI*2)
ctx.fillStyle=(d.type==="Crash"||d.type==="Ride"||d.type==="HH")?"#FFD700":"#fff"
ctx.fill()

ctx.strokeStyle="#000"
ctx.lineWidth=2
ctx.stroke()

ctx.textAlign="center"
ctx.fillStyle="#000"

if(label){
ctx.fillText(label,0,-5)
ctx.fillText(`${d.size}"`,0,15)
}else{
ctx.fillText(d.type,0,-5)
ctx.fillText(`${d.size}"`,0,15)
}

}

ctx.restore()

})

}

// ===== モーダル =====

const modal=document.getElementById("modal")
const overlay=document.getElementById("overlay")
const editModal=document.getElementById("editModal")

function openModal(){modal.style.display="block";overlay.style.display="block"}
function closeModal(){modal.style.display="none";overlay.style.display="none"}

function openEdit(d){
selected=d
editModal.style.display="block"
overlay.style.display="block"

document.getElementById("editSize").value=d.size
document.getElementById("rotateRange").value=d.rot||0

if(d.type==="Kick"){
document.getElementById("depthWrap").style.display="block"
document.getElementById("editDepth").value=d.depth
}else{
document.getElementById("depthWrap").style.display="none"
}
}

function closeEdit(){
editModal.style.display="none"
overlay.style.display="none"
}

// ===== 追加UI =====

document.getElementById("addBtn").onclick=()=>{
openModal()
document.getElementById("title").innerText="種類"
document.getElementById("content").innerHTML=`
<button onclick="step2('drum')">太鼓</button>
<button onclick="step2('cymbal')">シンバル</button>
`
}

function step2(cat){
let html=""
if(cat==="drum"){
html=`
<button onclick="step3('Kick')">Kick</button>
<button onclick="step3('Snare')">Snare</button>
<button onclick="step3('Tom')">Tom</button>
<button onclick="step3('Floor Tom')">Floor Tom</button>
`
}else{
html=`
<button onclick="step3('Crash')">Crash</button>
<button onclick="step3('Ride')">Ride</button>
<button onclick="step3('HH')">Hi-Hat</button>
`
}
document.getElementById("title").innerText="選択"
document.getElementById("content").innerHTML=html
}

function step3(type){
document.getElementById("title").innerText="サイズ"

let extra=""
if(type==="Kick"){
extra=`奥行:<input id="depth" type="number"><br>`
}

document.getElementById("content").innerHTML=`
サイズ:<input id="size" type="number"><br>
${extra}
<button onclick="create('${type}')">追加</button>
`
}

function create(type){
let size=parseInt(document.getElementById("size").value)
if(!size)return

let depth=18
if(type==="Kick"){
depth=parseInt(document.getElementById("depth").value)||18
}

items.push({
x:snap(200),
y:snap(200),
type:type,
size:size,
depth:depth,
rot:0
})

closeModal()
draw()
}

// ===== ドラッグ & タップ編集 =====

canvas.onmousedown=e=>{
let rect=canvas.getBoundingClientRect()
let x=e.clientX-rect.left
let y=e.clientY-rect.top

selected=null

for(let i=items.length-1;i>=0;i--){
let d=items[i]
let r=d.size*2
if(Math.hypot(d.x-x,d.y-y)<r){
drag=d
selected=d
break
}
}
}

canvas.onmousemove=e=>{
if(drag){
let rect=canvas.getBoundingClientRect()
let x=e.clientX-rect.left
let y=e.clientY-rect.top

drag.x=grid?snap(x):x
drag.y=grid?snap(y):y
draw()
}
}

canvas.onmouseup=e=>{
if(drag){
drag=null
}else if(selected){
openEdit(selected)
}
}

// ===== 編集 =====

function applyEdit(){
selected.size=parseInt(document.getElementById("editSize").value)

if(selected.type==="Kick"){
selected.depth=parseInt(document.getElementById("editDepth").value)
}

selected.rot=parseInt(document.getElementById("rotateRange").value)

closeEdit()
draw()
}

function deleteItem(){
items=items.filter(i=>i!==selected)
closeEdit()
draw()
}

// ===== 機能 =====

function toggleGrid(){grid=!grid;draw()}

function save(){localStorage.setItem("drum",JSON.stringify(items))}
function load(){
let d=localStorage.getItem("drum")
if(d){items=JSON.parse(d);draw()}
}

draw()

</script>

</body>
</html>
